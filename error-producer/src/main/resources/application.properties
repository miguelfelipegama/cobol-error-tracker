quarkus.http.port=8080
kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.cobol-errors-topic.connector=smallrye-kafka
mp.messaging.outgoing.cobol-errors-topic.topic=cobol-errors-topic
mp.messaging.outgoing.cobol-errors-topic.value.serializer=com.bank.errorproducer.dto.CobolErrorDtoSerializer

# Metrics — Micrometer / Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
# Tag all HTTP request metrics with the route URI
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-server.match-patterns=/api/v1/errors=/api/v1/errors

# Health check
quarkus.smallrye-health.root-path=/q/health
